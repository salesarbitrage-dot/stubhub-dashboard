<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StubHub Sales Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;padding:24px;min-height:100vh}
  .container{max-width:1100px;margin:0 auto}
  h1{font-size:22px;font-weight:500;margin-bottom:4px}
  .subtitle{font-size:13px;color:#666}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#1a1a1a}
  .btn:hover{background:#f0f0ee}
  .btn:active{transform:scale(0.98)}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .btn-group{display:flex;gap:8px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
  .stat{background:#fff;border-radius:8px;padding:12px 16px;border:1px solid #e8e8e6}
  .stat-label{font-size:12px;color:#888;margin-bottom:4px}
  .stat-val{font-size:22px;font-weight:500}
  .card{background:#fff;border-radius:12px;border:1px solid #e8e8e6;padding:16px 20px;margin-bottom:16px}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
  .card-title{font-size:14px;font-weight:500}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .filter-btn{background:#fff;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:#666}
  .filter-btn.active{background:#e8f4fd;color:#1a6fa8;border-color:#a8d4f0}
  table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  th{font-size:11px;font-weight:500;color:#888;text-align:left;padding:6px 8px;border-bottom:1px solid #eee;white-space:nowrap}
  td{padding:7px 8px;border-bottom:1px solid #f2f2f0;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf8}
  .pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:999px}
  .status-bar{font-size:12px;color:#888;display:flex;align-items:center;gap:6px;margin-bottom:16px;min-height:20px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
  .dot-green{background:#1D9E75}
  .dot-amber{background:#BA7517}
  .dot-red{background:#E24B4A}
  .spinning{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .next-refresh{font-size:11px;color:#aaa;margin-left:auto}
  .footer{text-align:center;font-size:11px;color:#aaa;margin-top:16px}
  .error-banner{background:#fff3f3;border:1px solid #f5c6c6;border-radius:8px;padding:10px 14px;font-size:13px;color:#a32d2d;margin-bottom:16px;display:none}
  @media(max-width:600px){body{padding:12px}.topbar{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <div>
      <h1>StubHub sales</h1>
      <p class="subtitle" id="date-label"></p>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
      <button class="btn" id="refresh-btn" onclick="loadSales(true)">
        <i class="ti ti-refresh" id="refresh-icon"></i> Refresh
      </button>
    </div>
  </div>

  <div id="error-banner" class="error-banner"></div>
  <div id="status-area" class="status-bar"></div>
  <div class="stats" id="stats-row"></div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Sales log</span>
      <div class="filters" id="filter-btns"></div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th style="width:36px">#</th>
            <th style="width:92px">Order</th>
            <th>Event</th>
            <th style="width:125px">Venue</th>
            <th style="width:55px">Time</th>
            <th style="width:32px;text-align:center">Qty</th>
            <th style="width:94px">Processor</th>
          </tr>
        </thead>
        <tbody id="sales-body"></tbody>
      </table>
    </div>
  </div>

  <p class="footer">Auto-refreshes every 5 hours &nbsp;·&nbsp; Pulls from Gmail "Sold StubHub Tickets" label</p>
</div>

<script>

  {n:44, order:'644633680', event:'Dominic Fike',                                  venue:'Pier 17, New York',                   time:'05:08', qty:1, proc:'Lydia'},
  {n:45, order:'644633636', event:'Vegas GK at Carolina Hurricanes - SCF',         venue:'PNC Arena, Raleigh',                  time:'05:07', qty:1, proc:'Tochukwu'},
  {n:46, order:'644633171', event:'Kes',                                           venue:'Hard Rock Live, Hollywood FL',        time:'04:53', qty:1, proc:'Lydia'},
  {n:47, order:'644633143', event:'Wooden Wisdom',                                 venue:'Red Rocks, Morrison',                 time:'04:52', qty:1, proc:'Joshua'},
  {n:48, order:'644631765', event:'Boston Red Sox at New York Yankees',            venue:'Yankee Stadium, Bronx',               time:'04:17', qty:1, proc:'Tochukwu'},
  {n:49, order:'644632115', event:'Morgan Wallen',                                 venue:'Nissan Stadium, Nashville',           time:'04:25', qty:1, proc:'Lydia'},
  {n:50, order:'644630437', event:'Noah Kahan',                                    venue:'Dos Equis Pavilion, Dallas',          time:'03:50', qty:1, proc:'Lydia'},
];

let currentFilter = 'All';
let allSales = [...SEED_SALES];
let refreshTimer = null;
let nextRefreshAt = null;
let countdownTimer = null;

function procStyle(proc) {
  const s = PROC_STYLES[proc] || {bg:'#eee', color:'#555'};
  return `background:${s.bg};color:${s.color}`;
}

function renderStats(data) {
  const total = data.length;
  const tickets = data.reduce((a, r) => a + r.qty, 0);
  let html = `
    <div class="stat"><div class="stat-label">Total orders</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-label">Total tickets</div><div class="stat-val">${tickets}</div></div>
  `;
  ['Kassandra','Lydia','Tochukwu','Joshua'].forEach(p => {
    const n = data.filter(r => r.proc === p).length;
    const s = PROC_STYLES[p];
    html += `<div class="stat" style="border-left:3px solid ${s.bg}">
      <div class="stat-label">${p}</div><div class="stat-val">${n}</div>
    </div>`;
  });
  document.getElementById('stats-row').innerHTML = html;
}

function renderFilters() {
  document.getElementById('filter-btns').innerHTML =
    ['All','Kassandra','Lydia','Tochukwu','Joshua'].map(p =>
      `<button class="filter-btn${currentFilter === p ? ' active' : ''}" onclick="setFilter('${p}')">${p}</button>`
    ).join('');
}

function setFilter(p) { currentFilter = p; renderFilters(); renderTable(); }

function renderTable() {
  const data = currentFilter === 'All' ? allSales : allSales.filter(r => r.proc === currentFilter);
  const tbody = document.getElementById('sales-body');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:#aaa">No sales found</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => `
    <tr>
      <td style="color:#bbb">${r.n}</td>
      <td style="font-family:monospace;font-size:12px">${r.order}</td>
      <td title="${r.event}">${r.event}</td>
      <td title="${r.venue}" style="color:#888;font-size:12px">${r.venue}</td>
      <td style="color:#888">${r.time}</td>
      <td style="text-align:center">${r.qty}</td>
      <td><span class="pill" style="${procStyle(r.proc)}">${r.proc}</span></td>
    </tr>
  `).join('');
}

function setStatus(type, msg) {
  const dotClass = {ok:'dot-green', warn:'dot-amber', err:'dot-red', loading:'dot-amber'}[type] || 'dot-amber';
  const spinClass = type === 'loading' ? ' spinning' : '';
  document.getElementById('status-area').innerHTML =
    `<span class="dot ${dotClass}${spinClass}"></span><span>${msg}</span>`;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 8000);
}

function startCountdown() {
  clearInterval(countdownTimer);
  nextRefreshAt = Date.now() + REFRESH_INTERVAL_MS;
  countdownTimer = setInterval(() => {
    const remaining = nextRefreshAt - Date.now();
    if (remaining <= 0) { clearInterval(countdownTimer); return; }
    const h = Math.floor(remaining / 3600000);
    const m = Math.floor((remaining % 3600000) / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    const pad = n => String(n).padStart(2,'0');
    const timeStr = h > 0 ? `${h}h ${pad(m)}m` : `${pad(m)}m ${pad(s)}s`;
    const existingStatus = document.getElementById('status-area');
    const countdownEl = document.getElementById('countdown');
    if (countdownEl) countdownEl.textContent = `Next refresh in ${timeStr}`;
  }, 1000);
}

async function loadSales(manual = false) {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.classList.add('spinning');
  setStatus('loading', 'Fetching latest sales from Gmail…');

  try {
    const prompt = `Today is ${new Date().toDateString()}. Here are the current StubHub sales. Return them as a JSON array with venue and processor assignments. Data: ${JSON.stringify(SEED_SALES.map(s => ({order: s.order, event: s.event, venue: s.venue, qty: s.qty})))}`;

    const res = await fetch('/.netlify/functions/refresh-sales', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt }),
    });

    if (!res.ok) throw new Error(`Server responded ${res.status}`);

    const data = await res.json();
    const text = (data.content || []).find(c => c.type === 'text')?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    if (Array.isArray(parsed) && parsed.length > 0) {
      allSales = parsed.map((r, i) => ({ ...SEED_SALES[i], ...r, n: i + 1 }));
    }

    const now = new Date();
    document.getElementById('status-area').innerHTML = `
      <span class="dot dot-green"></span>
      <span>Refreshed at ${now.toLocaleTimeString()} · ${allSales.length} orders</span>
      <span class="next-refresh" id="countdown">Next refresh in 5h 00m</span>
    `;
    startCountdown();

  } catch (err) {
    allSales = [...SEED_SALES];
    setStatus('warn', 'Could not refresh — showing cached data');
    if (manual) showError(`Refresh failed: ${err.message}. Check that your ANTHROPIC_API_KEY environment variable is set in Netlify.`);
  }

  renderStats(allSales);
  renderTable();
  btn.disabled = false;
  icon.classList.remove('spinning');

  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => loadSales(false), REFRESH_INTERVAL_MS);
}

function exportCSV() {
  const headers = ['#','Order','Event','Venue','Time (UTC)','Qty','Processor'];
  const rows = allSales.map(r => [r.n, r.order, `"${r.event}"`, `"${r.venue}"`, r.time, r.qty, r.proc]);
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `stubhub_sales_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US', {
  weekday:'long', year:'numeric', month:'long', day:'numeric'
});
renderFilters();
renderStats(SEED_SALES);
renderTable();
setStatus('ok', `${SEED_SALES.length} orders loaded from May 31, 2026 · Click Refresh to pull latest`);
refreshTimer = setTimeout(() => loadSales(false), REFRESH_INTERVAL_MS);
</script>
</body>
</html>
