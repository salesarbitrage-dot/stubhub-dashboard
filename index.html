<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StubHub Sales Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;padding:24px;min-height:100vh}
  .container{max-width:1200px;margin:0 auto}
  h1{font-size:22px;font-weight:500;margin-bottom:4px}
  .subtitle{font-size:13px;color:#666}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#1a1a1a}
  .btn:hover{background:#f0f0ee}
  .btn:active{transform:scale(0.98)}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .btn-group{display:flex;gap:8px;flex-wrap:wrap}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
  .stat{background:#fff;border-radius:8px;padding:12px 16px;border:1px solid #e8e8e6}
  .stat-label{font-size:12px;color:#888;margin-bottom:4px}
  .stat-val{font-size:22px;font-weight:500}
  .card{background:#fff;border-radius:12px;border:1px solid #e8e8e6;padding:16px 20px;margin-bottom:16px}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
  .card-title{font-size:14px;font-weight:500}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .filter-btn{background:#fff;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:#666}
  .filter-btn.active{background:#e8f4fd;color:#1a6fa8;border-color:#a8d4f0}
  table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  th{font-size:11px;font-weight:500;color:#888;text-align:left;padding:6px 8px;border-bottom:1px solid #eee;white-space:nowrap}
  td{padding:7px 8px;border-bottom:1px solid #f2f2f0;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf8}
  tr.processed td{opacity:0.4;text-decoration:line-through}
  tr.processed td:first-child{text-decoration:none;opacity:1}
  .pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:999px}
  .status-bar{font-size:12px;color:#888;display:flex;align-items:center;gap:6px;margin-bottom:16px;min-height:20px;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
  .dot-green{background:#1D9E75}.dot-amber{background:#BA7517}.dot-red{background:#E24B4A}
  .spinning{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .next-refresh{font-size:11px;color:#aaa;margin-left:8px}
  .footer{text-align:center;font-size:11px;color:#aaa;margin-top:16px}
  .progress-bar{height:4px;background:#eee;border-radius:2px;margin-bottom:20px;overflow:hidden}
  .progress-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width 1s linear}
  input[type="checkbox"]{width:15px;height:15px;cursor:pointer;accent-color:#1D9E75}
  .done-badge{display:inline-block;font-size:10px;background:#e8f8f2;color:#1D9E75;padding:1px 6px;border-radius:4px;margin-left:4px;text-decoration:none}
  .import-zone{border:2px dashed #ddd;border-radius:8px;padding:16px;text-align:center;color:#aaa;font-size:13px;margin-bottom:16px;cursor:pointer;transition:border-color 0.2s}
  .import-zone:hover{border-color:#1D9E75;color:#1D9E75}
  .import-zone.dragover{border-color:#1D9E75;background:#f0faf6;color:#1D9E75}
  #csv-input{display:none}
  @media(max-width:600px){body{padding:12px}.topbar{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1>StubHub sales</h1>
      <p class="subtitle" id="date-label"></p>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="document.getElementById('csv-input').click()">
        <i class="ti ti-upload"></i> Import CSV
      </button>
      <input type="file" id="csv-input" accept=".csv" onchange="importCSV(event)">
      <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
      <button class="btn" onclick="clearProcessed()"><i class="ti ti-trash"></i> Clear processed</button>
      <button class="btn" id="refresh-btn" onclick="loadSales(true)">
        <i class="ti ti-refresh" id="refresh-icon"></i> Refresh
      </button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:100%"></div></div>
  <div id="status-area" class="status-bar"></div>
  <div class="stats" id="stats-row"></div>
  <div class="card">
    <div class="card-header">
      <span class="card-title">Sales log</span>
      <div class="filters" id="filter-btns"></div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th style="width:32px;text-align:center">Done</th>
            <th style="width:32px">#</th>
            <th style="width:92px">Order</th>
            <th>Event</th>
            <th style="width:55px">Time</th>
            <th style="width:32px;text-align:center">Qty</th>
            <th style="width:94px">Processor</th>
          </tr>
        </thead>
        <tbody id="sales-body"></tbody>
      </table>
    </div>
  </div>
  <p class="footer">Auto-refreshes every hour · Import a CSV to update sales · Pulls from Gmail "Sold StubHub Tickets" label</p>
</div>
<script>
const REFRESH_INTERVAL_MS = 60 * 60 * 1000;
const PROCESSORS = ['Kassandra','Lydia','Tochukwu','Joshua','Pearl','Enomfon','Lois','Marco','Christine'];
const PROC_COLORS = [
  {bg:'#FCE5CD',color:'#7A4A10'},
  {bg:'#D9EAD3',color:'#2D6010'},
  {bg:'#CFE2F3',color:'#0C447C'},
  {bg:'#EAD1DC',color:'#72243E'},
  {bg:'#E8D5F5',color:'#5B2D8C'},
  {bg:'#D5EEF5',color:'#0A5C72'},
  {bg:'#F5E6D5',color:'#7A4A10'},
  {bg:'#D5F5E3',color:'#1A6B3C'},
  {bg:'#F5D5D5',color:'#8C1A1A'},

const PROC_STYLE_MAP = {};
PROCESSORS.forEach((p,i) => { PROC_STYLE_MAP[p] = PROC_COLORS[i]; });

const SEED_SALES = [

  {n:2,order:'644698221',event:'The Eagles',time:'00:22',qty:1},

  {n:11,order:'644695289',event:'Rufus Du Sol',time:'23:44',qty:1},
  {n:12,order:'644695152',event:'Mumford & Sons',time:'23:42',qty:1},

  {n:27,order:'644683404',event:"Commissioner's Cup: Washington Mystics at Atlanta Dream",time:'21:15',qty:1},

  {n:45,order:'644667525',event:'Governors Ball - Friday Pass',time:'18:06',qty:1},
  {n:46,order:'644667403',event:'Nate Bargatze',time:'18:04',qty:1},
  {n:47,order:'644666833',event:'SF Giants at Chicago Cubs',time:'17:57',qty:1},
  {n:48,order:'644666526',event:'Senegal vs Iraq - World Cup Group I',time:'17:53',qty:1},
  {n:49,order:'644665599',event:'Lollapalooza - 2 Day Pass (July 31 - Aug 1)',time:'17:43',qty:1},
  {n:50,order:'644665402',event:'NCAA Baseball CWS - Game 9',time:'17:41',qty:1},
];

function assignEqually(sales) {
  return sales.map((s,i) => ({...s, proc: PROCESSORS[i % PROCESSORS.length]}));
}

let currentFilter = 'All';
let allSales = assignEqually(SEED_SALES.map(s => ({...s})));
let processedOrders = JSON.parse(localStorage.getItem('processedOrders') || '[]');
let refreshTimer = null;
let progressTimer = null;

function saveProcessed() {
  try { localStorage.setItem('processedOrders', JSON.stringify(processedOrders)); } catch(e) {}
}

function procStyle(proc) {
  const s = PROC_STYLE_MAP[proc] || {bg:'#eee',color:'#555'};
  return `background:${s.bg};color:${s.color}`;
}

function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const lines = e.target.result.split('\n').filter(l => l.trim());
      const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase());
      const orderIdx = headers.findIndex(h => h.includes('order'));
      const eventIdx = headers.findIndex(h => h.includes('event'));
      const timeIdx  = headers.findIndex(h => h.includes('time'));
      const qtyIdx   = headers.findIndex(h => h.includes('qty') || h.includes('ticket'));
      const procIdx  = headers.findIndex(h => h.includes('processor'));
      const doneIdx  = headers.findIndex(h => h.includes('processed'));

      if (orderIdx === -1 || eventIdx === -1) {
        alert('CSV must have Order and Event columns.');
        return;
      }

      const imported = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(',').map(c => c.replace(/"/g,'').trim());
        if (!cols[orderIdx]) continue;
        imported.push({
          n: i,
          order: cols[orderIdx],
          event: cols[eventIdx] || '',
          time:  timeIdx  !== -1 ? cols[timeIdx]  : '',
          qty:   qtyIdx   !== -1 ? parseInt(cols[qtyIdx]) || 1 : 1,
          proc:  procIdx  !== -1 && cols[procIdx] ? cols[procIdx] : PROCESSORS[(i-1) % PROCESSORS.length],
        });
        if (doneIdx !== -1 && cols[doneIdx] && cols[doneIdx].toLowerCase() === 'yes') {
          if (!processedOrders.includes(cols[orderIdx])) processedOrders.push(cols[orderIdx]);
        }
      }

      if (!imported.length) { alert('No sales found in CSV.'); return; }
      allSales = imported;
      saveProcessed();
      renderStats(allSales);
      renderFilters();
      renderTable();
      setStatus('ok', `Imported ${imported.length} orders from CSV · ${new Date().toLocaleTimeString()}`);
      event.target.value = '';
    } catch(err) {
      alert('Could not read CSV: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function renderStats(data) {
  const total = data.length;
  const tickets = data.reduce((a,r) => a+r.qty, 0);
  const processed = data.filter(r => processedOrders.includes(r.order)).length;
  let html = `
    <div class="stat"><div class="stat-label">Total orders</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-label">Total tickets</div><div class="stat-val">${tickets}</div></div>
    <div class="stat" style="border-left:3px solid #1D9E75"><div class="stat-label">Processed</div><div class="stat-val">${processed}</div></div>
    <div class="stat" style="border-left:3px solid #BA7517"><div class="stat-label">Pending</div><div class="stat-val">${total-processed}</div></div>
  `;
  PROCESSORS.forEach(p => {
    const n = data.filter(r => r.proc === p).length;
    const s = PROC_STYLE_MAP[p];
    html += `<div class="stat" style="border-left:3px solid ${s.bg}"><div class="stat-label">${p}</div><div class="stat-val">${n}</div></div>`;
  });
  document.getElementById('stats-row').innerHTML = html;
}

function renderFilters() {
  const procs = ['All', ...new Set(['All', ...PROCESSORS, ...allSales.map(s => s.proc)].filter(Boolean))];
  document.getElementById('filter-btns').innerHTML =
    ['All',...PROCESSORS].map(p =>
      `<button class="filter-btn${currentFilter===p?' active':''}" onclick="setFilter('${p}')">${p}</button>`
    ).join('');
}

function setFilter(p) { currentFilter=p; renderFilters(); renderTable(); }

function toggleProcessed(order) {
  if (processedOrders.includes(order)) {
    processedOrders = processedOrders.filter(o => o !== order);
  } else {
    processedOrders.push(order);
  }
  saveProcessed();
  renderStats(allSales);
  renderTable();
}

function clearProcessed() {
  if (!confirm('Clear all processed checkboxes?')) return;
  processedOrders = [];
  saveProcessed();
  renderStats(allSales);
  renderTable();
}

function renderTable() {
  const data = currentFilter==='All' ? allSales : allSales.filter(r => r.proc===currentFilter);
  const tbody = document.getElementById('sales-body');
  if (!data.length) {
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:24px;color:#aaa">No sales found</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => {
    const done = processedOrders.includes(r.order);
    return `<tr class="${done?'processed':''}">
      <td style="text-align:center"><input type="checkbox" ${done?'checked':''} onchange="toggleProcessed('${r.order}')"></td>
      <td style="color:#bbb">${r.n}</td>
      <td style="font-family:monospace;font-size:12px">${r.order}</td>
      <td title="${r.event}">${r.event}${done?'<span class="done-badge">done</span>':''}</td>
      <td style="color:#888">${r.time}</td>
      <td style="text-align:center">${r.qty}</td>
      <td><span class="pill" style="${procStyle(r.proc)}">${r.proc}</span></td>
    </tr>`;
  }).join('');
}

function setStatus(type, msg, countdown) {
  const dotClass = {ok:'dot-green',warn:'dot-amber',err:'dot-red',loading:'dot-amber'}[type]||'dot-amber';
  const spinClass = type==='loading'?' spinning':'';
  document.getElementById('status-area').innerHTML =
    `<span class="dot ${dotClass}${spinClass}"></span><span>${msg}</span>${countdown?`<span class="next-refresh" id="countdown">${countdown}</span>`:''}`;
}

function startProgressBar() {
  clearInterval(progressTimer);
  const start = Date.now();
  progressTimer = setInterval(() => {
    const elapsed = Date.now()-start;
    const pct = Math.max(0,100-(elapsed/REFRESH_INTERVAL_MS)*100);
    const fill = document.getElementById('progress-fill');
    if (fill) {
      fill.style.width = pct+'%';
      fill.style.background = pct>50?'#1D9E75':pct>20?'#BA7517':'#E24B4A';
    }
    const remaining = REFRESH_INTERVAL_MS-elapsed;
    const m = Math.floor(remaining/60000);
    const s = Math.floor((remaining%60000)/1000);
    const el = document.getElementById('countdown');
    if (el) el.textContent = `Next refresh in ${m}m ${String(s).padStart(2,'0')}s`;
  }, 1000);
}

async function loadSales(manual=false) {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.classList.add('spinning');
  setStatus('loading','Fetching latest sales from Gmail...');
  try {
    const prompt = `Today is ${new Date().toDateString()}. Assign these ${allSales.length} StubHub sales equally across 9 processors in order: ${PROCESSORS.join(', ')}. Sale 1 goes to ${PROCESSORS[0]}, sale 2 to ${PROCESSORS[1]}, cycling through all 9. Return ONLY a JSON array with fields: {order, event, time, qty, proc}. Data: ${JSON.stringify(allSales.map(s => ({order:s.order,event:s.event,qty:s.qty})))}`;
    const res = await fetch('/.netlify/functions/refresh-sales', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt}),
    });
    const responseText = await res.text();
    const data = JSON.parse(responseText);
    const content = data.content || [];
    const textBlock = content.find(c => c.type==='text');
    const text = textBlock ? textBlock.text : '';
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    if (Array.isArray(parsed) && parsed.length>0) {
      allSales = parsed.map((r,i) => ({...allSales[i],...r,n:i+1}));
    }
    setStatus('ok',`Refreshed at ${new Date().toLocaleTimeString()} · ${allSales.length} orders`,'Next refresh in 60m 00s');
    startProgressBar();
  } catch(err) {
    setStatus('warn','Could not refresh — showing current data');
  }
  renderStats(allSales);
  renderTable();
  btn.disabled = false;
  icon.classList.remove('spinning');
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => loadSales(false), REFRESH_INTERVAL_MS);
}

function exportCSV() {
  const headers = ['#','Order','Event','Time (UTC)','Qty','Processor','Processed'];
  const rows = allSales.map(r => [r.n,r.order,`"${r.event}"`,r.time,r.qty,r.proc,processedOrders.includes(r.order)?'Yes':'No']);
  const csv = [headers,...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `stubhub_sales_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
renderFilters();
renderStats(allSales);
renderTable();
setStatus('ok',`${allSales.length} orders loaded · Import a CSV or click Refresh to update`,'Auto-refreshes every hour');
refreshTimer = setTimeout(() => loadSales(false), REFRESH_INTERVAL_MS);
</script>
</body>
</html>
