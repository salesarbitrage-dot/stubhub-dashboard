
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StubHub Sales Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;padding:24px;min-height:100vh}
  .container{max-width:1200px;margin:0 auto}
  h1{font-size:22px;font-weight:500;margin-bottom:4px}
  .subtitle{font-size:13px;color:#666}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#1a1a1a}
  .btn:hover{background:#f0f0ee}
  .btn:active{transform:scale(0.98)}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .btn-group{display:flex;gap:8px;flex-wrap:wrap}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:20px}
  .stat{background:#fff;border-radius:8px;padding:12px 16px;border:1px solid #e8e8e6}
  .stat-label{font-size:12px;color:#888;margin-bottom:4px}
  .stat-val{font-size:22px;font-weight:500}
  .card{background:#fff;border-radius:12px;border:1px solid #e8e8e6;padding:16px 20px;margin-bottom:16px}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
  .card-title{font-size:14px;font-weight:500}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .filter-btn{background:#fff;border:1px solid #ddd;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;color:#666}
  .filter-btn.active{background:#e8f4fd;color:#1a6fa8;border-color:#a8d4f0}
  table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
  th{font-size:11px;font-weight:500;color:#888;text-align:left;padding:6px 8px;border-bottom:1px solid #eee;white-space:nowrap}
  td{padding:7px 8px;border-bottom:1px solid #f2f2f0;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafaf8}
  tr.processed td{opacity:0.4;text-decoration:line-through}
  tr.processed td:first-child{text-decoration:none;opacity:1}
  .pill{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:999px}
  .priority-pill{outline:2px solid #1D9E75;outline-offset:1px}
  .status-bar{font-size:12px;color:#888;display:flex;align-items:center;gap:6px;margin-bottom:16px;min-height:20px;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
  .dot-green{background:#1D9E75}.dot-amber{background:#BA7517}.dot-red{background:#E24B4A}
  .spinning{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .next-refresh{font-size:11px;color:#aaa;margin-left:8px}
  .footer{text-align:center;font-size:11px;color:#aaa;margin-top:16px}
  .progress-bar{height:4px;background:#eee;border-radius:2px;margin-bottom:20px;overflow:hidden}
  .progress-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width 1s linear}
  input[type="checkbox"]{width:15px;height:15px;cursor:pointer;accent-color:#1D9E75}
  .done-badge{display:inline-block;font-size:10px;background:#e8f8f2;color:#1D9E75;padding:1px 6px;border-radius:4px;margin-left:4px;text-decoration:none}
  .schedule-info{background:#fff;border-radius:8px;border:1px solid #e8e8e6;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#666}
  .schedule-info strong{color:#1a1a1a}
  .off-badge{font-size:10px;background:#fef3f2;color:#b91c1c;padding:1px 6px;border-radius:4px;margin-left:4px}
  .on-badge{font-size:10px;background:#e8f8f2;color:#1D9E75;padding:1px 6px;border-radius:4px;margin-left:4px}
  #csv-input{display:none}
  @media(max-width:600px){body{padding:12px}.topbar{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1>StubHub sales</h1>
      <p class="subtitle" id="date-label"></p>
    </div>
    <div class="btn-group">
      <button class="btn" onclick="document.getElementById('csv-input').click()"><i class="ti ti-upload"></i> Import CSV</button>
      <input type="file" id="csv-input" accept=".csv" onchange="importCSV(event)">
      <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>
      <button class="btn" onclick="clearProcessed()"><i class="ti ti-trash"></i> Clear processed</button>
      <button class="btn" id="refresh-btn" onclick="loadSales(true)"><i class="ti ti-refresh" id="refresh-icon"></i> Refresh</button>
    </div>
  </div>

  <div id="schedule-banner" class="schedule-info"></div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:100%"></div></div>
  <div id="status-area" class="status-bar"></div>
  <div class="stats" id="stats-row"></div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Sales log</span>
      <div class="filters" id="filter-btns"></div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th style="width:32px;text-align:center">Done</th>
            <th style="width:28px">#</th>
            <th style="width:88px">Order</th>
            <th>Event</th>
            <th style="width:90px">Event Date</th>
            <th style="width:52px">Time</th>
            <th style="width:28px;text-align:center">Qty</th>
            <th style="width:96px">Processor</th>
          </tr>
        </thead>
        <tbody id="sales-body"></tbody>
      </table>
    </div>
  </div>
  <p class="footer">Auto-refreshes every hour · Import a CSV to update sales · Assignments based on work schedules</p>
</div>

<script>
const REFRESH_INTERVAL_MS = 60 * 60 * 1000;

const SCHEDULES = {
  'Enomfon':   ['Monday','Tuesday','Thursday','Friday','Saturday'],
  'Christine': ['Monday','Tuesday','Wednesday','Thursday','Saturday'],
  'Lois':      ['Monday','Tuesday','Wednesday','Thursday','Saturday'],
  'Tochukwu':  ['Monday','Tuesday','Wednesday','Thursday','Sunday'],
  'Joshua':    ['Monday','Tuesday','Wednesday','Thursday','Sunday'],
  'Marco':     ['Tuesday','Wednesday','Thursday','Friday','Saturday'],
  'Kassandra': ['Monday','Tuesday','Friday','Saturday','Sunday'],
  'Lydia':     ['Monday','Tuesday','Wednesday','Thursday','Sunday'],
  'Pearl':     ['Tuesday','Wednesday','Thursday','Friday','Saturday'],
};

const ALL_PROCESSORS = ['Kassandra','Lydia','Tochukwu','Joshua','Pearl','Enomfon','Lois','Marco','Christine'];
const PRIORITY_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday'];
const PRIORITY_MEMBERS = ['Joshua','Christine'];

const PROC_COLORS = {
  'Kassandra': {bg:'#FCE5CD',color:'#7A4A10'},
  'Lydia':     {bg:'#D9EAD3',color:'#2D6010'},
  'Tochukwu':  {bg:'#CFE2F3',color:'#0C447C'},
  'Joshua':    {bg:'#EAD1DC',color:'#72243E'},
  'Pearl':     {bg:'#E8D5F5',color:'#5B2D8C'},
  'Enomfon':   {bg:'#D5EEF5',color:'#0A5C72'},
  'Lois':      {bg:'#F5E6D5',color:'#7A4A10'},
  'Marco':     {bg:'#D5F5E3',color:'#1A6B3C'},
  'Christine': {bg:'#F5D5D5',color:'#8C1A1A'},
};

function getDayName(date) {
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][date.getDay()];
}

function getWorkingToday() {
  const day = getDayName(new Date());
  return {
    day,
    working: ALL_PROCESSORS.filter(p => SCHEDULES[p].includes(day)),
    off: ALL_PROCESSORS.filter(p => !SCHEDULES[p].includes(day)),
  };
}

function parseEventDate(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return isNaN(d.getTime()) ? null : d;
}

function assignSales(sales) {
  const { day, working } = getWorkingToday();
  if (!working.length) return sales.map((s,i) => ({...s, n:i+1, proc:'Unassigned'}));

  const priorityActive = PRIORITY_DAYS.includes(day);
  const priorityWorkers = PRIORITY_MEMBERS.filter(p => working.includes(p));
  const otherWorkers = working.filter(p => !PRIORITY_MEMBERS.includes(p));

  const sorted = [...sales].sort((a,b) => {
    const da = parseEventDate(a.event_date);
    const db = parseEventDate(b.event_date);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });

  let result = [];

  if (priorityActive && priorityWorkers.length) {
    const total = sorted.length;
    const priorityCount = Math.round(total * priorityWorkers.length / working.length);
    const prioritySales = sorted.slice(0, priorityCount);
    const otherSales = sorted.slice(priorityCount);

    prioritySales.forEach((s,i) => result.push({...s, proc: priorityWorkers[i % priorityWorkers.length]}));

    if (otherWorkers.length) {
      otherSales.forEach((s,i) => result.push({...s, proc: otherWorkers[i % otherWorkers.length]}));
    } else {
      otherSales.forEach((s,i) => result.push({...s, proc: priorityWorkers[i % priorityWorkers.length]}));
    }
  } else {
    sorted.forEach((s,i) => result.push({...s, proc: working[i % working.length]}));
  }

  return result.map((s,i) => ({...s, n:i+1}));
}

let currentFilter = 'All';
let allSales = [];
let processedOrders = JSON.parse(localStorage.getItem('processedOrders') || '[]');
let refreshTimer = null;
let progressTimer = null;

function saveProcessed() {
  try { localStorage.setItem('processedOrders', JSON.stringify(processedOrders)); } catch(e) {}
}

function procStyle(proc) {
  const s = PROC_COLORS[proc] || {bg:'#eee',color:'#555'};
  return `background:${s.bg};color:${s.color}`;
}

function renderScheduleBanner() {
  const { day, working, off } = getWorkingToday();
  const priorityActive = PRIORITY_DAYS.includes(day);
  const priorityWorkers = PRIORITY_MEMBERS.filter(p => working.includes(p));

  let html = `<strong>Today is ${day}.</strong> &nbsp;`;
  html += `Working: ` + working.map(p => `<span class="on-badge">${p}</span>`).join(' ');
  if (off.length) html += ` &nbsp; Off: ` + off.map(p => `<span class="off-badge">${p}</span>`).join(' ');
  if (priorityActive && priorityWorkers.length) {
    html += `<br><span style="margin-top:6px;display:inline-block">⭐ Priority today (closest event dates): <strong>${priorityWorkers.join(' & ')}</strong></span>`;
  }
  document.getElementById('schedule-banner').innerHTML = html;
}

function renderStats(data) {
  const total = data.length;
  const tickets = data.reduce((a,r) => a + (r.qty||1), 0);
  const processed = data.filter(r => processedOrders.includes(r.order)).length;
  const { working } = getWorkingToday();

  let html = `
    <div class="stat"><div class="stat-label">Total orders</div><div class="stat-val">${total}</div></div>
    <div class="stat"><div class="stat-label">Total tickets</div><div class="stat-val">${tickets}</div></div>
    <div class="stat" style="border-left:3px solid #1D9E75"><div class="stat-label">Processed</div><div class="stat-val">${processed}</div></div>
    <div class="stat" style="border-left:3px solid #BA7517"><div class="stat-label">Pending</div><div class="stat-val">${total-processed}</div></div>
  `;
  working.forEach(p => {
    const n = data.filter(r => r.proc === p).length;
    const s = PROC_COLORS[p] || {bg:'#eee'};
    html += `<div class="stat" style="border-left:3px solid ${s.bg}"><div class="stat-label">${p}</div><div class="stat-val">${n}</div></div>`;
  });
  document.getElementById('stats-row').innerHTML = html;
}

function renderFilters() {
  const { working } = getWorkingToday();
  document.getElementById('filter-btns').innerHTML =
    ['All', ...working].map(p =>
      `<button class="filter-btn${currentFilter===p?' active':''}" onclick="setFilter('${p}')">${p}</button>`
    ).join('');
}

function setFilter(p) { currentFilter=p; renderFilters(); renderTable(); }

function toggleProcessed(order) {
  if (processedOrders.includes(order)) {
    processedOrders = processedOrders.filter(o => o !== order);
  } else {
    processedOrders.push(order);
  }
  saveProcessed();
  renderStats(allSales);
  renderTable();
}

function clearProcessed() {
  if (!confirm('Clear all processed checkboxes?')) return;
  processedOrders = [];
  saveProcessed();
  renderStats(allSales);
  renderTable();
}

function renderTable() {
  const { working } = getWorkingToday();
  const priorityActive = PRIORITY_DAYS.includes(getDayName(new Date()));
  const priorityWorkers = PRIORITY_MEMBERS.filter(p => working.includes(p));

  const data = currentFilter==='All' ? allSales : allSales.filter(r => r.proc===currentFilter);
  const tbody = document.getElementById('sales-body');
  if (!data.length) {
    tbody.innerHTML='<tr><td colspan="8" style="text-align:center;padding:24px;color:#aaa">No sales found. Import a CSV to get started.</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => {
    const done = processedOrders.includes(r.order);
    const isPriority = priorityActive && priorityWorkers.includes(r.proc);
    return `<tr class="${done?'processed':''}">
      <td style="text-align:center"><input type="checkbox" ${done?'checked':''} onchange="toggleProcessed('${r.order}')"></td>
      <td style="color:#bbb">${r.n}</td>
      <td style="font-family:monospace;font-size:12px">${r.order}</td>
      <td title="${r.event||''}">${r.event||''}${done?'<span class="done-badge">done</span>':''}</td>
      <td style="color:#888;font-size:12px">${r.event_date||''}</td>
      <td style="color:#888">${r.time||''}</td>
      <td style="text-align:center">${r.qty||1}</td>
      <td><span class="pill ${isPriority?'priority-pill':''}" style="${procStyle(r.proc)}">${r.proc}</span></td>
    </tr>`;
  }).join('');
}

function setStatus(type, msg, countdown) {
  const dotClass = {ok:'dot-green',warn:'dot-amber',err:'dot-red',loading:'dot-amber'}[type]||'dot-amber';
  const spinClass = type==='loading'?' spinning':'';
  document.getElementById('status-area').innerHTML =
    `<span class="dot ${dotClass}${spinClass}"></span><span>${msg}</span>${countdown?`<span class="next-refresh" id="countdown">${countdown}</span>`:''}`;
}

function startProgressBar() {
  clearInterval(progressTimer);
  const start = Date.now();
  progressTimer = setInterval(() => {
    const elapsed = Date.now()-start;
    const pct = Math.max(0,100-(elapsed/REFRESH_INTERVAL_MS)*100);
    const fill = document.getElementById('progress-fill');
    if (fill) {
      fill.style.width = pct+'%';
      fill.style.background = pct>50?'#1D9E75':pct>20?'#BA7517':'#E24B4A';
    }
    const remaining = REFRESH_INTERVAL_MS-elapsed;
    const m = Math.floor(remaining/60000);
    const s = Math.floor((remaining%60000)/1000);
    const el = document.getElementById('countdown');
    if (el) el.textContent = `Next refresh in ${m}m ${String(s).padStart(2,'0')}s`;
  }, 1000);
}

function importCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const lines = e.target.result.split('\n').filter(l => l.trim());
      const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase());
      const idx = (names) => {
        for (const n of names) {
          const i = headers.findIndex(h => h.includes(n));
          if (i !== -1) return i;
        }
        return -1;
      };
      const orderIdx     = idx(['order']);
      const eventIdx     = idx(['event']);
      const eventDateIdx = idx(['event date','eventdate','event_date','date']);
      const timeIdx      = idx(['time']);
      const qtyIdx       = idx(['qty','ticket','quantity']);
      const doneIdx      = idx(['processed','done']);

      if (orderIdx === -1 || eventIdx === -1) {
        alert('CSV must have Order and Event columns.');
        return;
      }

      const rawSales = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].match(/(".*?"|[^,]+)(?=,|$)/g) || lines[i].split(',');
        const clean = cols.map(c => c.replace(/^"|"$/g,'').trim());
        if (!clean[orderIdx]) continue;
        rawSales.push({
          order:      clean[orderIdx],
          event:      eventIdx      !== -1 ? clean[eventIdx]      : '',
          event_date: eventDateIdx  !== -1 ? clean[eventDateIdx]  : '',
          time:       timeIdx       !== -1 ? clean[timeIdx]       : '',
          qty:        qtyIdx        !== -1 ? parseInt(clean[qtyIdx])||1 : 1,
        });
        if (doneIdx !== -1 && clean[doneIdx] && clean[doneIdx].toLowerCase() === 'yes') {
          if (!processedOrders.includes(clean[orderIdx])) processedOrders.push(clean[orderIdx]);
        }
      }

      if (!rawSales.length) { alert('No sales found in CSV.'); return; }

      allSales = assignSales(rawSales);
      saveProcessed();
      renderScheduleBanner();
      renderStats(allSales);
      renderFilters();
      renderTable();
      setStatus('ok', `Imported ${allSales.length} orders · Assigned based on today's schedule`, 'Auto-refreshes every hour');
      event.target.value = '';
    } catch(err) {
      alert('Could not read CSV: ' + err.message);
    }
  };
  reader.readAsText(file);
}

async function loadSales(manual=false) {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.classList.add('spinning');
  setStatus('loading','Fetching latest sales from Gmail...');

  try {
    const { working } = getWorkingToday();
    const day = getDayName(new Date());
    const priorityActive = PRIORITY_DAYS.includes(day);
    const priorityWorkers = PRIORITY_MEMBERS.filter(p => working.includes(p));

    const prompt = `Today is ${new Date().toDateString()} (${day}).
Working today: ${working.join(', ')}.
${priorityActive && priorityWorkers.length ? `Priority workers (get sales with soonest event dates): ${priorityWorkers.join(', ')}.` : ''}
Reassign these StubHub sales based on today's schedule. Sort by event_date ascending, assign soonest events to priority workers first, then distribute rest equally. Return ONLY a JSON array with fields: {order, event, event_date, time, qty, proc}.
Data: ${JSON.stringify(allSales.map(s => ({order:s.order,event:s.event,event_date:s.event_date,qty:s.qty})))}`;

    const res = await fetch('/.netlify/functions/refresh-sales', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt}),
    });

    const responseText = await res.text();
    const data = JSON.parse(responseText);
    const content = data.content || [];
    const textBlock = content.find(c => c.type==='text');
    const text = textBlock ? textBlock.text : '';
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    if (Array.isArray(parsed) && parsed.length > 0) {
      allSales = parsed.map((r,i) => ({...allSales[i],...r,n:i+1}));
    }

    setStatus('ok',`Refreshed at ${new Date().toLocaleTimeString()} · ${allSales.length} orders`,'Next refresh in 60m 00s');
    startProgressBar();
  } catch(err) {
    setStatus('warn','Could not refresh — showing current data');
  }

  renderScheduleBanner();
  renderStats(allSales);
  renderFilters();
  renderTable();
  btn.disabled = false;
  icon.classList.remove('spinning');
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => loadSales(false), REFRESH_INTERVAL_MS);
}

function exportCSV() {
  const headers = ['#','Order','Event','Event Date','Time (UTC)','Qty','Processor','Processed'];
  const rows = allSales.map(r => [
    r.n, r.order, `"${r.event||''}"`, r.event_date||'', r.time||'', r.qty||1, r.proc,
    processedOrders.includes(r.order)?'Yes':'No'
  ]);
  const csv = [headers,...rows].map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `stubhub_sales_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
renderScheduleBanner();
renderFilters();
renderStats(allSales);
renderTable();
setStatus('ok',"Ready · Import a CSV to load today's sales",'Auto-refreshes every hour');
refreshTimer = setTimeout(() => loadSales(false), REFRESH_INTERVAL_MS);
</script>
</body>
</html>
